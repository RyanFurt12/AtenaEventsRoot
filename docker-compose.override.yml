# Overrides de desenvolvimento local — aplicado automaticamente pelo Docker Compose.
# NÃO commitar se contiver segredos. Para produção, remova ou ignore este arquivo
# (use:  docker compose -f docker-compose.yml up -d --build).
services:
  # MailHog — servidor SMTP de desenvolvimento (captura emails; UI em http://localhost:8025).
  # Só existe em dev; em produção a API usa o SMTP real definido em MAIL_* no .env.
  mailhog:
    image: mailhog/mailhog
    container_name: atena-mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI web
    networks:
      - default

  api:
    ports:
      - "8080:8080"
    # Em dev, envia emails para o MailHog (sem autenticação/TLS).
    environment:
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_SMTP_AUTH: "false"
      MAIL_SMTP_STARTTLS: "false"
    depends_on:
      mailhog:
        condition: service_started

  web:
    ports:
      - "3000:80"

# Em dev não existe Caddy, então recriamos caddy_net como rede local comum.
networks:
  caddy_net:
    external: false
